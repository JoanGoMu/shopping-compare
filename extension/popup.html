<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CompareCart</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; width: 280px; padding: 20px; background: #fff; color: #111; }
    h1 { font-size: 18px; font-weight: 700; color: #4f46e5; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #9ca3af; margin-bottom: 16px; }
    .status { font-size: 13px; color: #374151; margin-bottom: 14px; line-height: 1.5; }
    .status .email { font-weight: 600; color: #111; }
    .btn { display: block; width: 100%; padding: 10px 16px; border-radius: 10px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; transition: background 0.15s; }
    .btn-primary { background: #4f46e5; color: white; }
    .btn-primary:hover { background: #4338ca; }
    .btn-secondary { background: #f3f4f6; color: #374151; margin-top: 8px; }
    .btn-secondary:hover { background: #e5e7eb; }
    .divider { height: 1px; background: #f3f4f6; margin: 14px 0; }
    .hint { font-size: 11px; color: #9ca3af; text-align: center; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>CompareCart</h1>
  <p class="subtitle">Compare products across any store</p>

  <div id="logged-out" style="display:none">
    <p class="status">Sign in to start saving products for comparison.</p>
    <a id="signin-btn" href="#" class="btn btn-primary">Sign in / Create account</a>
  </div>

  <div id="logged-in" style="display:none">
    <p class="status">Signed in as <span class="email" id="user-email"></span></p>
    <a id="dashboard-btn" href="#" class="btn btn-primary">Open dashboard</a>
    <button id="signout-btn" class="btn btn-secondary">Sign out</button>
    <div class="divider"></div>
    <p class="hint">Browse any shopping site and click the<br>"Save to Compare" button that appears.</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>

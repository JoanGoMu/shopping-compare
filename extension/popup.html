<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CompareCart</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; width: 280px; padding: 20px; background: #FAF8F5; color: #1A1A18; }
    h1 { font-size: 18px; font-weight: 700; font-style: italic; color: #1A1A18; margin-bottom: 2px; letter-spacing: -0.3px; }
    .subtitle { font-size: 11px; color: #8C8278; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.1em; }
    label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: #8C8278; margin-bottom: 5px; }
    input[type="email"], input[type="password"] { width: 100%; border: 1px solid #E8E3DC; background: #fff; padding: 8px 10px; font-size: 13px; color: #1A1A18; outline: none; margin-bottom: 10px; }
    input[type="email"]:focus, input[type="password"]:focus { border-color: #C4603C; }
    .error { font-size: 12px; color: #b91c1c; background: #fef2f2; border: 1px solid #fecaca; padding: 6px 10px; margin-bottom: 10px; }
    .btn { display: block; width: 100%; padding: 10px; border: none; font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; text-transform: uppercase; letter-spacing: 0.15em; transition: background 0.15s; }
    .btn-primary { background: #C4603C; color: white; }
    .btn-primary:hover { background: #A84E30; }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }
    .btn-secondary { background: transparent; color: #8C8278; border: 1px solid #E8E3DC; margin-top: 8px; }
    .btn-secondary:hover { border-color: #8C8278; color: #1A1A18; }
    .status { font-size: 12px; color: #1A1A18; margin-bottom: 12px; }
    .email-label { font-weight: 600; }
    .divider { height: 1px; background: #E8E3DC; margin: 12px 0; }
    .hint { font-size: 11px; color: #8C8278; text-align: center; line-height: 1.5; }
    a { color: #C4603C; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: #8C8278; margin-bottom: 10px; }
    .pref-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 12px; color: #1A1A18; }
    .pref-row input[type="checkbox"] { cursor: pointer; flex-shrink: 0; accent-color: #C4603C; }
    .pref-row.disabled { opacity: 0.45; }
    .pref-row.disabled input { cursor: default; }
    .hidden-sites-section { margin-bottom: 8px; }
    .hidden-sites-label { font-size: 11px; color: #8C8278; margin-bottom: 4px; }
    .hidden-sites-list { list-style: none; padding: 0; margin: 0; }
    .hidden-sites-list li { display: flex; align-items: center; justify-content: space-between; font-size: 11px; padding: 3px 0; color: #1A1A18; }
    .show-site-btn { font-size: 10px; color: #C4603C; background: none; border: none; cursor: pointer; padding: 0; font-family: inherit; }
    .show-site-btn:hover { text-decoration: underline; }
    .btn-reset { display: block; width: 100%; padding: 6px; font-size: 11px; color: #8C8278; background: none; border: 1px solid #E8E3DC; cursor: pointer; font-family: inherit; transition: border-color 0.15s, color 0.15s; }
    .btn-reset:not(:disabled):hover { border-color: #8C8278; color: #1A1A18; }
    .btn-reset:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
  <h1>CompareCart</h1>
  <p class="subtitle">Save to compare</p>

  <!-- Logged out: show sign-in form -->
  <div id="logged-out" style="display:none">
    <div id="error" class="error" style="display:none"></div>
    <div>
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div>
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button id="signin-btn" class="btn btn-primary">Sign in</button>
    <div class="divider"></div>
    <p class="hint">No account? <a id="signup-link" href="#">Create one free</a></p>
  </div>

  <!-- Logged in -->
  <div id="logged-in" style="display:none">
    <p class="status">Signed in as <span class="email-label" id="user-email"></span></p>
    <a id="dashboard-btn" href="#" class="btn btn-primary" style="display:block;text-decoration:none;text-align:center;padding:10px;font-size:11px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;background:#C4603C;color:white;">Open dashboard</a>
    <button id="signout-btn" class="btn btn-secondary">Sign out</button>
    <div class="divider"></div>
    <p class="hint">Browse any store and click the<br>"Save to Compare" button.</p>
  </div>

  <!-- Preferences (always visible) -->
  <div class="divider"></div>
  <p class="section-title">Preferences</p>
  <div id="hide-site-row" class="pref-row">
    <input type="checkbox" id="hide-site-toggle" />
    <span id="hide-site-label">Hide button on this site</span>
  </div>
  <div id="hidden-sites-section" class="hidden-sites-section" style="display:none">
    <p class="hidden-sites-label">Hidden on:</p>
    <ul id="hidden-sites-list" class="hidden-sites-list"></ul>
  </div>
  <button id="reset-position-btn" class="btn-reset" disabled>Reset button position</button>

  <script src="popup.js"></script>
</body>
</html>
